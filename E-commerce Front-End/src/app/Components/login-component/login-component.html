<div class="container auth-page">
  <div class="card auth-card shadow-sm">
    <div class="card-body">
      <h2 class="mb-3">Login</h2>

      <div class="alert alert-danger" *ngIf="error">
        {{ error }}
      </div>

      <div class="mb-3">
        <label class="form-label">Usuario</label>
        <input type="text" class="form-control" [(ngModel)]="usuario">
      </div>

      <div class="mb-3">
        <label class="form-label">Clave</label>
        <input type="password" class="form-control" [(ngModel)]="clave">
      </div>

      <button class="btn btn-primary w-100" (click)="login()">
        Ingresar
      </button>

      <a class="d-block text-center mt-3" routerLink="/registro">
        Crear cuenta
      </a>
    </div>
  </div>
</div>
