<div class="container mt-4">
  <h2 class="mb-4">Confirmar compra</h2>

  <div class="alert alert-success" *ngIf="orden">
    Compra confirmada. Orden nro. {{ orden.id }} por $ {{ orden.total }}.
  </div>

  <div class="alert alert-danger" *ngIf="error">
    {{ error }}
  </div>

  <div class="alert alert-info" *ngIf="items.length === 0 && !orden">
    No hay productos para confirmar.
  </div>

  <div *ngIf="items.length > 0">
    <table class="table align-middle">
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad</th>
          <th>Subtotal</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of items">
          <td>{{ item.producto.nombre }}</td>
          <td>{{ item.cantidad }}</td>
          <td>$ {{ obtenerSubtotal(item) }}</td>
        </tr>
      </tbody>
    </table>

    <div class="confirmation-actions">
      <a class="btn btn-outline-secondary" routerLink="/carrito">
        Volver al carrito
      </a>

      <div class="text-end">
        <p class="fs-4 mb-2">
          Total: <strong>$ {{ obtenerTotal() }}</strong>
        </p>
        <button class="btn btn-primary" (click)="confirmar()">
          Confirmar orden
        </button>
      </div>
    </div>
  </div>

  <button class="btn btn-primary" *ngIf="orden" (click)="volverAProductos()">
    Volver a productos
  </button>
</div>
